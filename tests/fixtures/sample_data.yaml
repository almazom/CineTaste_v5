# ─────────────────────────────────────────────────────────────────────────────
# ANALYSIS RESULTS (for ct-filter testing)
# ─────────────────────────────────────────────────────────────────────────────

analysis_results:
  # Sample batch with varying scores
  mixed_batch:
    analyzed:
      - movie:
          title: "Сталкер (Stalker)"
          year: 1979
          director: "Andrei Tarkovsky"
          genres: ["science fiction", "drama"]
        score: 95
        recommendation: "must_see"
        reasoning: "Perfect match: Tarkovsky + philosophical sci-fi"

      - movie:
          title: "Inception"
          year: 2010
          director: "Christopher Nolan"
          genres: ["science fiction", "action"]
        score: 75
        recommendation: "recommended"
        reasoning: "Nolan directs, but action-heavy"

      - movie:
          title: "The Shining"
          year: 1980
          director: "Stanley Kubrick"
          genres: ["horror", "drama"]
        score: 45
        recommendation: "skip"
        reasoning: "Horror genre is in dislikes"

      - movie:
          title: "Avengers: Endgame"
          year: 2019
          director: "Russo Brothers"
          genres: ["action", "adventure"]
        score: 20
        recommendation: "skip"
        reasoning: "Blockbuster franchise keywords"

  # All high scores
  all_recommended:
    analyzed:
      - movie:
          title: "Film A"
          director: "Tarkovsky"
        score: 90
        recommendation: "must_see"
      - movie:
          title: "Film B"
          director: "Nolan"
        score: 85
        recommendation: "must_see"
      - movie:
          title: "Film C"
          director: "Lynch"
        score: 80
        recommendation: "recommended"

  # All low scores
  all_skipped:
    analyzed:
      - movie:
          title: "Blockbuster 1"
        score: 30
        recommendation: "skip"
      - movie:
          title: "Blockbuster 2"
        score: 25
        recommendation: "skip"

  # Empty analysis
  empty:
    analyzed: []
    meta:
      agent: "test"
      timestamp: "2026-03-10T12:00:00Z"


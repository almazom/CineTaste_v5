# CineTaste Test Fixtures
# Sample data for integration testing

# ─────────────────────────────────────────────────────────────────────────────
# USERS & PROFILES
# ─────────────────────────────────────────────────────────────────────────────

users:
  default:
    email: "test @cinetaste.local"
    telegram_handle: "@test_user"
    profile_path: "taste/profile.yaml"
    
  admin:
    email: "admin @cinetaste.local"
    telegram_handle: "@admin"
    profile_path: "taste/profile.yaml"

# ─────────────────────────────────────────────────────────────────────────────
# TASTE PROFILES (for testing different preference scenarios)
# ─────────────────────────────────────────────────────────────────────────────

taste_profiles:
  # Standard profile — balanced preferences
  standard:
    version: "1.1"
    user: "test_user"
    likes:
      directors:
        - "Tarkovsky"
        - "Nolan"
        - "Lynch"
      genres:
        - "science fiction"
        - "drama"
        - "art-house"
      keywords:
        - "philosophical"
        - "atmospheric"
    dislikes:
      genres:
        - "horror"
        - "slasher"
      keywords:
        - "blockbuster"
        - "franchise"
    thresholds:
      must_see: 85
      recommended: 60
      maybe: 40
      skip: 0

  # Strict profile — very selective
  strict:
    version: "1.1"
    user: "strict_user"
    likes:
      directors:
        - "Kubrick"
        - "Tarkovsky"
      genres:
        - "art-house"
    dislikes:
      genres:
        - "horror"
        - "comedy"
        - "action"
    thresholds:
      must_see: 95
      recommended: 80
      maybe: 60
      skip: 0

  # Lenient profile — accepts most content
  lenient:
    version: "1.1"
    user: "casual_user"
    likes:
      directors: []
      genres:
        - "drama"
        - "comedy"
    dislikes:
      genres: []
    thresholds:
      must_see: 50
      recommended: 30
      maybe: 15
      skip: 0

# ─────────────────────────────────────────────────────────────────────────────
# MOVIES (for testing various scenarios)
# ─────────────────────────────────────────────────────────────────────────────

movies:
  # Classic art-house — should match standard profile
  stalker:
    title: "Сталкер (Stalker)"
    year: 1979
    director: "Andrei Tarkovsky"
    genres:
      - "science fiction"
      - "drama"
      - "art-house"
    keywords:
      - "philosophical"
      - "atmospheric"
      - "surreal"
    expected_score: 95
    expected_recommendation: "must_see"

  # Modern sci-fi — partial match
  inception:
    title: "Inception"
    year: 2010
    director: "Christopher Nolan"
    genres:
      - "science fiction"
      - "action"
    keywords:
      - "mind-bending"
      - "atmospheric"
    expected_score: 75
    expected_recommendation: "recommended"

  # Horror — should be filtered out
  the_shining:
    title: "The Shining"
    year: 1980
    director: "Stanley Kubrick"
    genres:
      - "horror"
      - "drama"
    keywords:
      - "psychological"
    expected_score: 45
    expected_recommendation: "skip"
    filter_reason: "horror genre in dislikes"

  # Blockbuster franchise — should be filtered
  avengers:
    title: "Avengers: Endgame"
    year: 2019
    director: "Russo Brothers"
    genres:
      - "action"
      - "adventure"
    keywords:
      - "blockbuster"
      - "franchise"
      - "sequel"
    expected_score: 20
    expected_recommendation: "skip"
    filter_reason: "blockbuster and franchise keywords"

  # Borderline case — exactly at threshold
  borderline:
    title: "Borderline Film"
    year: 2020
    director: "Unknown Director"
    genres:
      - "drama"
    keywords:
      - "character-driven"
    expected_score: 60
    expected_recommendation: "recommended"
    note: "Exactly at recommended threshold (>= 60)"

  # Empty title edge case
  special_chars:
    title: "Film with \"quotes\" and émojis 🎬"
    year: 2021
    director: "François Truffaut"
    genres:
      - "drama"
    keywords: []
    expected_score: 50
    note: "Tests special character handling"

# ─────────────────────────────────────────────────────────────────────────────
# SHOWTIMES (for ct-schedule testing)
# ─────────────────────────────────────────────────────────────────────────────

showtimes:
  naberezhnie-chelni:

# ─────────────────────────────────────────────────────────────────────────────
# ERROR SCENARIOS (for recovery path testing)
# ─────────────────────────────────────────────────────────────────────────────

error_scenarios:
  source_unavailable:
    type: "http_error"
    status: 503
    message: "Service Temporarily Unavailable"
    recovery: "Retry after 5 minutes"

  ai_agent_timeout:
    type: "timeout"
    timeout_seconds: 720
    recovery: "Increase timeout or retry with different agent"

  all_agents_fail:
    type: "agent_chain_exhausted"
    agents_tried: ["kimi", "gemini", "qwen", "pi"]
    recovery: "Check network connectivity and API credentials"

  telegram_auth_error:
    type: "telegram_error"
    code: "unauthorized"
    message: "Bot token invalid"
    recovery: "Update bot token in .env"

  contract_violation:
    type: "schema_error"
    schema: "movie-batch"
    field: "movies[].title"
    error: "missing required field"
    recovery: "Fix ct-fetch title extraction"

# ─────────────────────────────────────────────────────────────────────────────
# EXPECTED RESULTS (for test assertions)
# ─────────────────────────────────────────────────────────────────────────────

expected_results:
  # Full pipeline with standard profile
  full_pipeline_standard:
    input: "mixed_batch"
    expected_filtered_count: 2  # stalker + inception
    expected_must_see: 1
    expected_recommended: 1
    expected_skip: 2

  # Strict profile filters more
  full_pipeline_strict:
    input: "mixed_batch"
    expected_filtered_count: 1  # only stalker
    expected_must_see: 1
    expected_recommended: 0
    expected_skip: 3

  # Empty input
  empty_input:
    input: "empty"
    expected_filtered_count: 0
    message_type: "no_movies"
